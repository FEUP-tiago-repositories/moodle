name: Moodle Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LOGIN_URL: ${{ secrets.LOGIN_URL }}
      ASSIGNMENT_URL: ${{ secrets.ASSIGNMENT_URL }}
      EXPECTED_FILENAME: ${{ secrets.EXPECTED_FILENAME }}
      PROFILE_DIR: ./profile
      DOWNLOADS_DIR: ./downloads
      STATE_FILE: ./state.json
      UP_USERNAME: ${{ secrets.UP_USERNAME }}
      UP_PASSWORD: ${{ secrets.UP_PASSWORD }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_SUBJECT: ${{ secrets.EMAIL_SUBJECT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore Moodle session cache
        uses: actions/cache/restore@v4
        with:
          path: |
            profile
            state.json
          key: moodle-session-${{ github.ref_name }}
          restore-keys: |
            moodle-session-

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        run: npm run watch

      - name: Save Moodle session cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            profile
            state.json
          key: moodle-session-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload state artifact (24h)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moodle-state
          path: |
            profile
            state.json
          retention-days: 1
          if-no-files-found: ignore
